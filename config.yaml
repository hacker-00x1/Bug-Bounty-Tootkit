recon:
  whois: true
  dns_records:
    - A
    - AAAA
    - MX
    - NS
    - TXT
    - CNAME
    - SOA
  crtsh: true

vulns:
  check_headers: true
  check_cors: true
  check_open_redirect: true
  check_xss: true
  check_sqli: true
  check_ssrf: true
  check_lfi: true
  check_sensitive_files: true
  check_methods: true

report:
  formats:
    - html
    - json
  output_dir: reports
